<!DOCTYPE html>
<html>
<head>
  <title>Students</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, sans-serif; background: #0f172a; color: #e2e8f0; }
    nav { background: #1e293b; padding: 14px 30px; display: flex; align-items: center; gap: 30px; border-bottom: 1px solid #334155; }
    nav h1 { font-size: 18px; font-weight: 600; color: #38bdf8; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 14px; }
    .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
    .section { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; margin-bottom: 24px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; color: #cbd5e1; }
    form { display: flex; flex-direction: column; gap: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 12px; color: #64748b; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-red { background: #dc2626; color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 6px; text-decoration: none; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 8px 12px; text-align: left; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; }
    td { padding: 10px 12px; border-bottom: 1px solid #0f172a; }
  </style>
</head>
<body>
<nav>
  <h1>Attendance System</h1>
  <a href="/">Dashboard</a>
  <a href="/live">Live Session</a>
  <a href="/students">Students</a>
  <a href="/reports">Reports</a>
</nav>
<div class="container">
  <div class="section">
    <h2>Add New Student</h2>
    <form action="/upload_student" method="POST" enctype="multipart/form-data">
      <div class="row">
        <div><label>Roll Number</label><input type="text" name="roll" placeholder="e.g. ECE037" required></div>
        <div><label>Full Name</label><input type="text" name="name" placeholder="e.g. Bhoomi Jaiswal" required></div>
      </div>
      <div><label>Photo (clear front-facing photo)</label><input type="file" name="photo" accept="image/*" required></div>
      <button type="submit" class="btn btn-primary">Add Student</button>
    </form>
  </div>
  <div class="section">
    <h2>Enrolled Students ({{ students|length }})</h2>
    {% if students %}
    <table>
      <tr><th>Roll No</th><th>Name</th><th>Action</th></tr>
      {% for s in students %}
      <tr>
        <td>{{ s.roll }}</td>
        <td>{{ s.name }}</td>
        <td><a href="/delete_student/{{ s.file }}" class="btn-red" onclick="return confirm('Delete?')">Delete</a></td>
      </tr>
      {% endfor %}
    </table>
    {% else %}
    <p style="color:#475569; font-size:13px;">No students enrolled yet.</p>
    {% endif %}
  </div>
</div>
</body>
</html>
